<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Publications — Sourab Chakma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="main-header">
            <nav class="navbar">
                <button class="hamburger-menu" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="Skills.html">Skills</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="education.html">Education</a></li>
                    <li><a href="publications.html">Publications</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </header>

        <div class="scrollable-content-area">
            <div class="container">
                <section class="section">
                    <h2><i class="fas fa-book"></i> Publications</h2>
                    <p>Coming soon. My research publications and papers will be listed here.</p>
                </section>
            </div>
        </div>

        <footer class="main-footer">
            <p>&copy; 2024 Sourab Chakma. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        
        if (hamburger) {
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('active');
            });
            
            // Close menu when a link is clicked
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('active');
                });
            });
        }
        
        // Highlight current page in navigation
        document.querySelectorAll('.nav-links a').forEach(link => {
            const href = link.getAttribute('href');
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            if (href === currentPage || (href === 'index.html' && currentPage === '')) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
