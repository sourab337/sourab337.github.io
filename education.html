<body>
  <header class="main-header">
    <nav class="navbar">
      <button class="hamburger-menu" id="hamburger">
        <span></span>
        <span></span>

      </button>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>

    </nav>
  </header>

  <main class="scrollable-content-area">
    <div class="container">
      <section class="section">
        <h2>Education</h2>
        <div class="two-col">
          <div>
            <h3>B.Sc. in Computer Science</h3>
            <p style="font-size: 1.05rem; font-weight: 700;"><strong>Mawlana Bhashani Science & Technology University</strong></p>

  <footer class="main-footer">&copy; 2026 Sourab Chakma</footer>

  <script>
    // Hamburger menu toggle
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    
    if (hamburger) {
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });
        
        // Close menu when a link is clicked
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });
    }
    
    // Highlight current page in navigation
    document.querySelectorAll('.nav-links a').forEach(link => {
      const href = link.getAttribute('href');
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      if (href === currentPage || (href === 'index.html' && currentPage === '')) {\n        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
